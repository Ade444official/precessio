<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Precessio — La Forgia</title>
<style>
  :root { --bord:#6B1F2A; --gold:#D4A94A; --goldl:#EAD9A8; --bg:#0b0507; --panel:#241014; }
  html,body { margin:0; height:100%; background:var(--bg); overflow:hidden; font-family:Georgia,serif; }
  #ui { position:fixed; top:0; left:0; bottom:0; width:270px; z-index:10; overflow-y:auto;
        background:rgba(22,10,13,.95); border-right:2px solid var(--bord); padding:12px; box-sizing:border-box; }
  h1 { color:var(--goldl); letter-spacing:3px; font-size:19px; margin:0 0 2px; }
  .sub { color:var(--gold); font-style:italic; font-size:11px; margin-bottom:12px; }
  label { color:var(--gold); font-size:11px; display:block; margin:6px 0 2px; }
  select,input[type=number],input[type=text] { width:100%; box-sizing:border-box; background:#1d0d10;
        color:var(--goldl); border:1px solid var(--bord); border-radius:4px; padding:4px 6px;
        font-family:inherit; font-size:13px; }
  .btn { background:var(--bord); color:#fff; cursor:pointer; letter-spacing:1px;
        border:1px solid var(--gold); padding:6px 10px; width:100%; margin-top:8px; font-family:inherit; }
  .btn2 { background:#1d0d10; color:var(--gold); cursor:pointer; border:1px solid var(--bord);
        padding:4px 8px; font-size:12px; font-family:inherit; }
  #lista { margin-top:10px; }
  .obj { display:flex; justify-content:space-between; align-items:center; color:var(--goldl);
        font-size:12.5px; border-bottom:1px solid #3a1a20; padding:4px 2px; }
  .obj span { cursor:pointer; }
  .del { color:#c98; cursor:pointer; padding:0 4px; }
  #info { position:fixed; bottom:8px; right:12px; z-index:10; color:var(--gold); font-size:11.5px;
          background:rgba(22,10,13,.7); padding:4px 10px; border-radius:6px; text-align:right; }
  a { color:var(--gold); }
  .due { display:flex; gap:6px; }
</style>
</head>
<body>
<div id="ui">
  <h1>LA FORGIA</h1>
  <div class="sub">costruisci le tue strutture &middot; metri e azimut veri &middot; tutto tuo, per sempre</div>

  <label>Tipo di struttura</label>
  <select id="tipo" onchange="tipoChanged()">
    <option value="piramide">Piramide</option>
    <option value="pilastro">Pilastro / blocco</option>
    <option value="muro">Muro</option>
    <option value="cerchio">Cerchio di pilastri</option>
  </select>
  <div class="due">
    <div style="flex:1"><label>Est (m)</label><input id="px" type="number" value="0" step="5"></div>
    <div style="flex:1"><label>Nord (m)</label><input id="py" type="number" value="0" step="5"></div>
  </div>
  <div class="due">
    <div style="flex:1"><label id="l1">Base (m)</label><input id="d1" type="number" value="230" step="1"></div>
    <div style="flex:1"><label id="l2">Altezza (m)</label><input id="d2" type="number" value="146" step="1"></div>
  </div>
  <div class="due">
    <div style="flex:1"><label id="l3">Spessore (m)</label><input id="d3" type="number" value="2" step="0.5"></div>
    <div style="flex:1"><label>Azimut (&deg;)</label><input id="az" type="number" value="0" step="1"></div>
  </div>
  <div id="cerchiobox" style="display:none">
    <label>Numero pilastri</label><input id="npil" type="number" value="12" step="1">
  </div>
  <label>Nome (facoltativo)</label><input id="nome" type="text" placeholder="es. Recinto D">
  <input type="button" class="btn" value="&#128296; FORGIA" onclick="aggiungi()">

  <div id="lista"></div>

  <input type="button" class="btn" value="&#8681; SALVA PROGETTO (.json)" onclick="salva()">
  <label style="margin-top:8px">Carica progetto</label>
  <input type="file" id="carica" accept=".json" onchange="caricaFile(event)" style="color:var(--gold);font-size:11px">
  <div style="margin-top:12px; font-size:11px; color:var(--gold);">
    <a href="index.html">&larr; Precessio</a> &middot; <a href="planetario.html">Il Nastro</a> &middot; <a href="specchio.html">Lo Specchio</a>
  </div>
</div>
<div id="info">trascina: orbita &middot; rotella: zoom &middot; Nord = in alto all'avvio<br>griglia: quadrati da 50 m</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene,camera,renderer,strutture=[],grp;
let yaw=0,pitch=35,dist=600;
const D2R=Math.PI/180;
function tipoChanged(){
 const t=document.getElementById('tipo').value;
 const l1=document.getElementById('l1'),l2=document.getElementById('l2'),l3=document.getElementById('l3');
 const cb=document.getElementById('cerchiobox');
 cb.style.display= t==='cerchio'?'block':'none';
 if(t==='piramide'){l1.textContent='Base (m)';l2.textContent='Altezza (m)';l3.textContent='(non usato)';
  document.getElementById('d1').value=230;document.getElementById('d2').value=146;}
 if(t==='pilastro'){l1.textContent='Larghezza (m)';l2.textContent='Altezza (m)';l3.textContent='Profondit\u00e0 (m)';
  document.getElementById('d1').value=1.5;document.getElementById('d2').value=5;document.getElementById('d3').value=0.6;}
 if(t==='muro'){l1.textContent='Lunghezza (m)';l2.textContent='Altezza (m)';l3.textContent='Spessore (m)';
  document.getElementById('d1').value=30;document.getElementById('d2').value=3;document.getElementById('d3').value=1;}
 if(t==='cerchio'){l1.textContent='Raggio (m)';l2.textContent='Alt. pilastri (m)';l3.textContent='Largh. pilastri (m)';
  document.getElementById('d1').value=10;document.getElementById('d2').value=4;document.getElementById('d3').value=1.2;}
}
function init(){
 scene=new THREE.Scene();
 camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.5,20000);
 renderer=new THREE.WebGLRenderer({antialias:true});
 renderer.setSize(innerWidth,innerHeight);
 document.body.appendChild(renderer.domElement);
 addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
 // suolo + griglia da 50 m
 const ground=new THREE.Mesh(new THREE.CircleGeometry(5000,64),
  new THREE.MeshBasicMaterial({color:0x2A1216}));
 ground.rotation.x=-Math.PI/2;scene.add(ground);
 const grid=new THREE.GridHelper(2000,40,0x6B1F2A,0x3a1a20);
 grid.position.y=0.2;scene.add(grid);
 // assi cardinali
 const mk=(x,z,txt)=>{const c=document.createElement('canvas');c.width=128;c.height=64;
  const g=c.getContext('2d');g.font='40px Georgia';g.fillStyle='#D4A94A';
  g.textAlign='center';g.fillText(txt,64,44);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));
  sp.scale.set(120,60,1);sp.position.set(x,40,z);scene.add(sp);};
 mk(0,-1050,'N');mk(1050,0,'E');mk(0,1050,'S');mk(-1050,0,'O');
 grp=new THREE.Group();scene.add(grp);
 // orbita
 let drag=false,px=0,py=0;
 renderer.domElement.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;});
 addEventListener('pointerup',()=>drag=false);
 addEventListener('pointermove',e=>{if(!drag)return;
  yaw+=(e.clientX-px)*0.3;pitch+=(e.clientY-py)*0.3;
  pitch=Math.max(5,Math.min(89,pitch));px=e.clientX;py=e.clientY;});
 addEventListener('wheel',e=>{dist*=(e.deltaY>0?1.1:0.9);dist=Math.max(30,Math.min(6000,dist));});
 renderer.setAnimationLoop(()=>{
  const y=yaw*D2R,p=pitch*D2R;
  camera.position.set(dist*Math.cos(p)*Math.sin(y),dist*Math.sin(p),dist*Math.cos(p)*Math.cos(y));
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);});
 tipoChanged();ridisegna();
}
function mesh3D(o){
 const g=new THREE.Group();
 const mat=new THREE.MeshBasicMaterial({color:0x1d0d10});
 const edge=m=>{const e=new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),
  new THREE.LineBasicMaterial({color:0xD4A94A}));e.position.copy(m.position);
  e.rotation.copy(m.rotation);return e;};
 if(o.tipo==='piramide'){
  const m=new THREE.Mesh(new THREE.ConeGeometry(o.d1/Math.SQRT2,o.d2,4),mat);
  m.position.y=o.d2/2;m.rotation.y=Math.PI/4;
  g.add(m);g.add(edge(m));}
 if(o.tipo==='pilastro'||o.tipo==='muro'){
  const m=new THREE.Mesh(new THREE.BoxGeometry(o.d1,o.d2,o.d3),mat);
  m.position.y=o.d2/2;g.add(m);g.add(edge(m));}
 if(o.tipo==='cerchio'){
  for(let i=0;i<o.n;i++){
   const a=i/o.n*2*Math.PI;
   const m=new THREE.Mesh(new THREE.BoxGeometry(o.d3,o.d2,o.d3*0.5),mat);
   m.position.set(o.d1*Math.sin(a),o.d2/2,-o.d1*Math.cos(a));
   m.rotation.y=-a;
   g.add(m);g.add(edge(m));}}
 g.position.set(o.x,0,-o.y);      // Est=+X, Nord=-Z
 g.rotation.y=-o.az*D2R;          // azimut orario da Nord
 return g;
}
function ridisegna(){
 grp.clear();
 for(const o of strutture)grp.add(mesh3D(o));
 const l=document.getElementById('lista');l.innerHTML='';
 strutture.forEach((o,i)=>{
  l.insertAdjacentHTML('beforeend','<div class="obj"><span>'+
   (o.nome||o.tipo)+' ('+o.x+'E, '+o.y+'N)</span><span class="del" onclick="rimuovi('+i+')">&#10006;</span></div>');});
}
function aggiungi(){
 const o={tipo:document.getElementById('tipo').value,
  x:parseFloat(document.getElementById('px').value)||0,
  y:parseFloat(document.getElementById('py').value)||0,
  d1:parseFloat(document.getElementById('d1').value)||1,
  d2:parseFloat(document.getElementById('d2').value)||1,
  d3:parseFloat(document.getElementById('d3').value)||1,
  az:parseFloat(document.getElementById('az').value)||0,
  n:parseInt(document.getElementById('npil').value)||12,
  nome:document.getElementById('nome').value.trim()};
 strutture.push(o);ridisegna();
}
function rimuovi(i){strutture.splice(i,1);ridisegna();}
function salva(){
 const dati={app:'Precessio - La Forgia',versione:1,data:new Date().toISOString(),strutture};
 const a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([JSON.stringify(dati,null,1)],{type:'application/json'}));
 a.download='forgia_progetto.json';a.click();
}
function caricaFile(ev){
 const f=ev.target.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=()=>{try{const d=JSON.parse(r.result);
   if(d.strutture){strutture=d.strutture;ridisegna();}}catch(e){alert('File non valido');}};
 r.readAsText(f);
}
init();
</script>
</body>
</html>
